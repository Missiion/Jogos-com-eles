<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CASA - NORTE | JOGOS</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════
       LOADING SCREEN — cobre tudo até os jogos
       estarem prontos; dispensado pelo app.js
       ═══════════════════════════════════════════ -->
  <div id="page-loader" class="page-loader" aria-hidden="true">
    <!-- A camada de blur + overlay fica em ::before via CSS;
         a pulsação é controlada por JS via --loader-blur -->
    <div class="loader-bg" id="loader-bg"></div>

    <div class="loader-center">
      <!-- Spinner grande -->
      <div class="loader-ring">
        <svg class="loader-ring-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle class="loader-ring-track" cx="50" cy="50" r="42" stroke-width="5"/>
          <circle class="loader-ring-arc"   cx="50" cy="50" r="42" stroke-width="5"
                  stroke-linecap="round"
                  stroke-dasharray="264"
                  stroke-dashoffset="200"/>
        </svg>
      </div>

      <!-- Texto com typewriter -->
      <div class="loader-text-wrap">
        <span class="loader-text" id="loader-text"></span>
      </div>
    </div>
  </div>

  <!-- Admin key hint (invisible until triggered) -->
  <div id="admin-hint" class="admin-hint">
    <span id="admin-hint-text"></span>
  </div>

  <!-- Admin Panel — flutua no canto inferior direito; colapsado por defeito,
       descolapsa ao clicar no botão circular (admin-fab) -->
  <div id="admin-overlay" class="admin-overlay hidden">
    <div class="admin-panel" id="admin-panel">

      <!-- Tests Panel — popup flutuante acima do fab de testes;
           abre/fecha independentemente do admin-panel-body -->
      <div id="admin-tests-panel" class="admin-tests-panel">
        <button id="admin-force-loading-btn" class="admin-test-btn" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
          <span id="admin-force-loading-label" data-i18n="Forçar Loading">Forçar Loading</span>
        </button>
        <button id="admin-create-trash-btn" class="admin-test-btn" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          <span data-i18n="Criar Reprovados">Criar Reprovados</span>
        </button>
        <button id="admin-clear-trash-btn" class="admin-test-btn" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
          <span data-i18n="Limpar Reprovados">Limpar Reprovados</span>
        </button>
        <button id="admin-test-notifications-btn" class="admin-test-btn" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span data-i18n="Simular notificações">Simular notificações</span>
        </button>
      </div>

      <div class="admin-fabs-row">
        <button class="admin-fab admin-tests-fab" id="admin-tests-btn" aria-label="Testes" title="Testes">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 2v6.5L4.5 17a2 2 0 0 0 1.8 3h11.4a2 2 0 0 0 1.8-3L15 8.5V2"/><line x1="9" y1="2" x2="15" y2="2"/><line x1="9.5" y1="13" x2="14.5" y2="13"/></svg>
        </button>
        <button class="admin-fab" id="admin-fab" data-i18n-aria-label="Abrir painel de administrador" aria-label="Abrir painel de administrador">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </button>
      </div>

      <div class="admin-panel-body" id="admin-panel-body">
        <div class="admin-header">
          <div class="admin-badge">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span data-i18n="Modo Administrador">Modo Administrador</span>
          </div>
          <button class="admin-close" id="admin-close" data-i18n-aria-label="Sair do modo administrador" aria-label="Sair do modo administrador">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="admin-search-section">
          <label class="admin-label" for="admin-search-input" data-i18n="Pesquisar Jogo">Pesquisar Jogo</label>
          <div class="admin-search-row">
            <input type="text" id="admin-search-input" class="admin-input" data-i18n-placeholder="Nome do jogo..." placeholder="Nome do jogo..." autocomplete="off" />
            <button id="admin-search-btn" class="admin-search-btn" data-i18n-aria-label="Pesquisar" aria-label="Pesquisar">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
          </div>
          <div id="admin-search-results" class="admin-search-results hidden"></div>
        </div>

        <div class="admin-divider">
          <span data-i18n="Na lista">Na lista</span>
        </div>

        <div id="admin-game-list" class="admin-game-list">
          <div class="admin-empty" data-i18n="Nenhum jogo adicionado ainda.">Nenhum jogo adicionado ainda.</div>
        </div>

        <div id="admin-status" class="admin-status hidden"></div>
      </div>
    </div>
  </div>

  <!-- Key Art Picker — popup de admin para escolher a key-art preferida
       de um jogo (global, gravado no Firestore) -->
  <div id="keyart-modal" class="keyart-modal hidden">
    <div class="keyart-backdrop" id="keyart-backdrop"></div>
    <div class="keyart-panel">
      <div class="keyart-header">
        <span class="keyart-title" id="keyart-title" data-i18n="Escolher Key Art">Escolher Key Art</span>
        <button class="keyart-close" id="keyart-close" data-i18n-aria-label="Fechar" aria-label="Fechar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="keyart-grid" id="keyart-grid"></div>
    </div>
  </div>

  <!-- Playlist Modal — aparece ao clicar no botão de playlist de um card jogado -->
  <div id="addtab-modal" class="addtab-modal hidden">
    <div class="addtab-backdrop" id="addtab-backdrop"></div>
    <div class="addtab-panel">
      <div class="addtab-header">
        <span class="addtab-title" id="addtab-title" data-i18n="Gravações">Gravações</span>
        <button class="addtab-close" id="addtab-close" data-i18n-aria-label="Fechar" aria-label="Fechar">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="addtab-list" id="addtab-list">
        <div class="playlist-form">
          <label class="playlist-label" for="playlist-url-input" data-i18n="Link da playlist do YouTube">Link da playlist do YouTube</label>
          <input type="url" class="playlist-url-input" id="playlist-url-input" data-i18n-placeholder="https://www.youtube.com/playlist?list=..." placeholder="https://www.youtube.com/playlist?list=..." autocomplete="off"/>
          <div class="playlist-buttons">
            <button class="playlist-remove-btn hidden" id="playlist-remove-btn" type="button" data-i18n="Remover">Remover</button>
            <button class="playlist-save-btn" id="playlist-save-btn" type="button" data-i18n="Guardar">Guardar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast — aviso flutuante (ex: "Regista-te primeiro para pesquisar") -->
  <div id="toast" class="toast">
    <span id="toast-text"></span>
  </div>

  <!-- Main Content -->
  <main class="main">

    <!-- Toolbar: Tabs + Sort + View -->
    <div class="toolbar" id="toolbar">
      <div class="toolbar-left">
        <!-- Dropdown de tabs — pill activa funciona como trigger; hover revela as restantes opções -->
        <div class="tabs-dropdown" id="tabs-dropdown">
          <button class="tabs-dropdown-trigger" id="tabs-dropdown-trigger" aria-haspopup="listbox" aria-expanded="false">
            <span class="tabs-dropdown-label" id="tabs-dropdown-label" data-i18n="Todos">Todos</span>
            <span class="tab-count" id="tabs-dropdown-count">0</span>
            <svg class="tabs-dropdown-chevron" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="tabs-dropdown-menu" id="tabs-dropdown-menu" role="listbox"><!-- opções de tabs injetadas aqui --></div>
        </div>
        <!-- Criar Tab (só visível em editor-mode) -->
        <div class="create-tab-wrap editor-only hidden" id="create-tab-wrap">
          <button class="create-tab-btn" id="create-tab-btn" data-i18n-title="Criar nova tab" title="Criar nova tab">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span data-i18n="Criar_Tab">Criar_Tab</span>
          </button>
          <div class="create-tab-input-wrap hidden" id="create-tab-input-wrap">
            <input type="text" class="create-tab-input" id="create-tab-input" data-i18n-placeholder="Nome da tab..." placeholder="Nome da tab..." maxlength="32" autocomplete="off"/>
            <button class="create-tab-confirm" id="create-tab-confirm" data-i18n-aria-label="Confirmar" aria-label="Confirmar">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
          </div>
        </div>

        <!-- Genre/theme tag filter -->
        <div class="tag-filter" id="tag-filter">
          <button class="tag-filter-trigger" id="tag-filter-trigger" aria-haspopup="listbox" aria-expanded="false">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
            <span class="tag-filter-label" id="tag-filter-label" data-i18n="Filtrar">Filtrar</span>
            <span class="tag-filter-count hidden" id="tag-filter-count">0</span>
          </button>
          <button class="tag-filter-quick-clear hidden" id="tag-filter-quick-clear" type="button" aria-label="Limpar filtros" data-i18n-aria-label="Limpar filtros" title="Limpar filtros">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          <div class="tag-filter-menu" id="tag-filter-menu" role="listbox" aria-multiselectable="true">
            <div class="tag-filter-subtabs" id="tag-filter-subtabs">
              <button class="tag-filter-subtab active" data-subtab="tags" id="tag-filter-subtab-tags" data-i18n="Géneros & Temas">Géneros &amp; Temas</button>
              <button class="tag-filter-subtab" data-subtab="status" id="tag-filter-subtab-status" data-i18n="Estado de Lançamento">Estado de Lançamento</button>
              <button class="tag-filter-subtab" data-subtab="common" id="tag-filter-subtab-common" data-i18n="Jogos em comum">Jogos em comum</button>
            </div>
            <div class="tag-filter-header">
              <span class="tag-filter-header-label" id="tag-filter-header-label" data-i18n="Géneros & Temas">Géneros &amp; Temas</span>
              <button class="tag-filter-clear hidden" id="tag-filter-clear" data-i18n="Limpar">Limpar</button>
            </div>
            <div class="tag-filter-list" id="tag-filter-list"><!-- tags injetadas pelo JS --></div>
            <div class="tag-filter-list hidden" id="tag-filter-list-status"><!-- estados injetados pelo JS --></div>
            <div class="tag-filter-list hidden" id="tag-filter-list-common"><!-- users injetados pelo JS --></div>
          </div>
        </div>

        <!-- Discover button — opens discovery mode -->
        <div class="discover-wrap" id="discover-wrap">
          <button class="discover-trigger" id="discover-trigger" aria-label="Descobre" data-i18n-aria-label="Descobre" title="Descobre">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 6.1L20 11l-6.1 1.9L12 19l-1.9-6.1L4 11l6.1-1.9L12 3z"/><path d="M18 14l.8 2.2L21 17l-2.2.8L18 20l-.8-2.2L15 17l2.2-.8L18 14z"/><path d="M5 3l.6 1.4L7 5l-1.4.6L5 7l-.6-1.4L3 5l1.4-.6L5 3z"/></svg>
            <span class="discover-label" id="discover-label" data-i18n="Descobre">Descobre</span>
          </button>
        </div>
      </div>

      <!-- Toolbar center: Register + Search (centro do header) -->
      <div class="toolbar-center">
        <div class="register-search-wrap" id="register-search-wrap">
          <!-- Botão Regista-te / Nome do utilizador -->
          <button class="register-btn" id="register-btn" type="button">
            <span class="register-btn-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
              </svg>
            </span>
            <span class="register-btn-text" data-i18n="Registar">Registar</span>
          </button>
          <!-- Input de registo (escondido até clicar no botão) -->
          <input type="text" class="register-input hidden" id="register-input" maxlength="8" data-i18n-placeholder="Nome (máx 8)..." placeholder="Nome (máx 8)..." autocomplete="off"/>
          <!-- Barra de pesquisa -->
          <div class="header-search-wrap" id="header-search-wrap">
            <input type="text" class="header-search-input" id="header-search-input" data-i18n-placeholder="Pesquisar jogos..." placeholder="Pesquisar jogos..." autocomplete="off" disabled/>
            <button class="header-search-btn" id="header-search-btn" type="button" aria-label="Pesquisar">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
            <div class="header-search-results hidden" id="header-search-results"></div>
          </div>
        </div>
      </div>

      <div class="toolbar-right">
        <!-- Notifications — bell button + dropdown -->
        <div class="notifications-wrap" id="notifications-wrap">
          <button class="notifications-trigger" id="notifications-trigger" aria-haspopup="true" aria-expanded="false" data-i18n-aria-label="Notificações" data-i18n-title="Notificações" aria-label="Notificações" title="Notificações">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <span class="notifications-badge hidden" id="notifications-badge">0</span>
          </button>
          <div class="notifications-menu" id="notifications-menu">
            <div class="notifications-header">
              <span class="notifications-title" data-i18n="Notificações">Notificações</span>
              <button class="notifications-clear-btn hidden" id="notifications-clear-btn" type="button" data-i18n="Limpar tudo">Limpar tudo</button>
            </div>
            <div class="notifications-list" id="notifications-list">
              <div class="notifications-empty" data-i18n="Sem notificações.">Sem notificações.</div>
            </div>
          </div>
        </div>

        <!-- Settings — pill + dropdown (mesmo padrão do tag-filter) -->
        <div class="settings-wrap" id="settings-wrap">
          <button class="settings-trigger" id="settings-trigger" aria-haspopup="true" aria-expanded="false" data-i18n-aria-label="Aspeto" data-i18n-title="Aspeto" aria-label="Aspeto" title="Aspeto">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
          <div class="settings-menu" id="settings-menu">
            <!-- Secção: fundo -->
            <div class="settings-section">
              <span class="settings-section-label" data-i18n="Fundo">Fundo</span>
              <div class="bg-carousel-grid" id="bg-carousel-grid">
                <!-- miniaturas injetadas pelo JS -->
              </div>
            </div>
            <!-- Secção: desfoque -->
            <div class="settings-section">
              <span class="settings-section-label" data-i18n="Desfoque de fundo">Desfoque de fundo</span>
              <div class="blur-slider-row">
                <input type="range" class="blur-slider" id="blur-slider" min="0" max="20" step="0.5" value="2"/>
                <span class="blur-value-label" id="blur-value-label">2px</span>
              </div>
            </div>
            <!-- Secção: idioma -->
            <div class="settings-section">
              <span class="settings-section-label" data-i18n="Idioma">Idioma</span>
              <div class="lang-options" id="lang-options">
                <button class="lang-option" data-lang="pt" type="button">
                  <span>Português</span>
                </button>
                <button class="lang-option active" data-lang="en" type="button">
                  <span>English</span>
                </button>
              </div>
            </div>
            <!-- Secção: conta (editar nome) -->
            <div class="settings-section" id="account-section" style="display:none;">
              <span class="settings-section-label" data-i18n="Conta">Conta</span>
              <div class="account-edit-wrap">
                <input type="text" class="account-name-input" id="account-name-input" maxlength="8" data-i18n-placeholder="Novo nome..." placeholder="Novo nome..." autocomplete="off"/>
                <button class="account-save-btn" id="account-save-btn" type="button" data-i18n="Guardar">Guardar</button>
              </div>
            </div>
            <!-- Secção: opções -->
            <div class="settings-section">
              <span class="settings-section-label" data-i18n="Opções">Opções</span>
              <div class="options-row">
                <label class="option-toggle">
                  <input type="checkbox" id="option-show-hidden" />
                  <span data-i18n="Mostrar jogos escondidos">Mostrar jogos escondidos</span>
                </label>
                <label class="option-toggle">
                  <input type="checkbox" id="option-yt-autoplay" checked />
                  <span data-i18n="YouTube autoplay">YouTube autoplay</span>
                </label>
                <label class="option-toggle">
                  <input type="checkbox" id="option-mute-notifications" />
                  <span data-i18n="Mutar notificações">Mutar notificações</span>
                </label>
              </div>
            </div>
          </div>
        </div>

        <!-- Sort -->
        <div class="sort-group">
          <button class="sort-btn active" data-sort="random" data-i18n-title="Ordem aleatória" title="Ordem aleatória">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
            <span data-i18n="Aleatório">Aleatório</span>
          </button>
          <button class="sort-btn" data-sort="name" data-i18n-title="Ordenar por nome" title="Ordenar por nome">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="14" y2="12"/><line x1="4" y1="18" x2="9" y2="18"/></svg>
            <span data-i18n="A–Z">A–Z</span>
          </button>
          <button class="sort-btn sort-btn-votes" data-sort="upvotes" data-i18n-title="Mais votados" title="Mais votados">
            <svg class="sort-icon-up" width="13" height="13" viewBox="0 0 20 20" fill="currentColor" fill-rule="evenodd" stroke="none"><path d="M10 19a3.966 3.966 0 01-3.96-3.962V10.98H2.838c-.706 0-1.335-.42-1.605-1.073-.27-.652-.122-1.396.377-1.895l7.754-7.759a.925.925 0 011.272 0l7.754 7.76a1.734 1.734 0 01.376 1.894c-.27.652-.9 1.073-1.605 1.073h-3.202v4.058A3.965 3.965 0 0110 19zm-7.01-9.82h4.85v4.73c0 1.13.81 2.163 1.934 2.278a2.163 2.163 0 002.386-2.15V9.18h4.85L10 2.164 2.99 9.18z"/></svg>
            <svg class="sort-icon-down" width="13" height="13" viewBox="0 0 20 20" fill="currentColor" fill-rule="evenodd" stroke="none" style="display:none"><path d="M10 1a3.966 3.966 0 013.96 3.962V9.02h3.202c.706 0 1.335.42 1.605 1.073.27.652.122 1.396-.377 1.895l-7.754 7.759a.925.925 0 01-1.272 0l-7.754-7.76a1.734 1.734 0 01-.376-1.894c.27-.652.9-1.073 1.605-1.073h3.202V4.962A3.965 3.965 0 0110 1zm7.01 9.82h-4.85V5.09c0-1.13-.81-2.163-1.934-2.278a2.163 2.163 0 00-2.386 2.15v5.859H2.989l7.01 7.016 7.012-7.016z"/></svg>
            <span data-i18n="Votos">Votos</span>
          </button>
          <button class="sort-btn" data-sort="rating" data-i18n-title="Ordenar por nota" title="Ordenar por nota">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
            <span data-i18n="Nota">Nota</span>
          </button>
        </div>

        <!-- View mode -->
        <div class="view-group">
          <button class="view-btn" data-view="grid" data-i18n-title="Grelha (4 col)" title="Grelha (4 col)">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
              <rect x="1"  y="1"  width="8" height="8" rx="1.2"/>
              <rect x="11" y="1"  width="8" height="8" rx="1.2"/>
              <rect x="1"  y="11" width="8" height="8" rx="1.2"/>
              <rect x="11" y="11" width="8" height="8" rx="1.2"/>
            </svg>
          </button>
          <button class="view-btn" data-view="five" data-i18n-title="Grelha (5 col)" title="Grelha (5 col)">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
              <!-- linha de cima: 3 col -->
              <rect x="0.3" y="1" width="5.6" height="8" rx="1"/>
              <rect x="7.2" y="1" width="5.6" height="8" rx="1"/>
              <rect x="14.1" y="1" width="5.6" height="8" rx="1"/>
              <!-- linha de baixo: 2 col, mais largos para alinhar à grelha -->
              <rect x="0.3" y="11" width="9.05" height="8" rx="1"/>
              <rect x="10.65" y="11" width="9.05" height="8" rx="1"/>
            </svg>
          </button>
          <button class="view-btn" data-view="compact" data-i18n-title="Compacto (6 col)" title="Compacto (6 col)">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
              <rect x="0.3" y="1" width="5.6" height="8" rx="1"/>
              <rect x="7.2" y="1" width="5.6" height="8" rx="1"/>
              <rect x="14.1" y="1" width="5.6" height="8" rx="1"/>
              <rect x="0.3" y="11" width="5.6" height="8" rx="1"/>
              <rect x="7.2" y="11" width="5.6" height="8" rx="1"/>
              <rect x="14.1" y="11" width="5.6" height="8" rx="1"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div id="game-list" class="game-list">
      <div class="loading-state" id="loading-state">
        <div class="loading-spinner"></div>
        <span data-i18n="A carregar jogos...">Loading games...</span>
      </div>
    </div>

    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon">🎮</div>
      <p data-i18n="Ainda não há jogos na lista.">No games in the list yet.</p>
    </div>
  </main>

  <!-- Game Detail Modal -->
  <div id="game-modal" class="game-modal hidden">
    <div class="modal-backdrop" id="modal-backdrop"></div>

    <div class="modal-content">
      <button class="modal-close" id="modal-close" data-i18n-aria-label="Fechar" aria-label="Fechar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>

      <!-- Banner do jogo (capa) — fora do modal-content, espaço livre à esquerda -->
      <div class="modal-banner" id="modal-banner"></div>

      <!-- Box 1: Screenshots/Video -->
      <div class="modal-media" id="modal-media">
        <!-- bottom-right: steam — injected by JS alongside media -->
      </div>

      <!-- Aba: estúdio, desenvolvedor, data de lançamento, estado de lançamento, engine —
           fora do modal-content, espaço livre à direita -->
      <div class="modal-extra-info" id="modal-extra-info"></div>

      <!-- Box 2: Description / info (glass) -->
      <div class="modal-info" id="modal-info"></div>
    </div>

    <!-- Discover navigation cards — only visible in discover mode -->
    <div class="discover-nav discover-nav-prev hidden" id="discover-nav-prev"></div>
    <div class="discover-nav discover-nav-next hidden" id="discover-nav-next"></div>

  </div>

  <!-- Loader — arranca antes do Firebase/app para a animação começar de imediato -->
  <script src="loader.js"></script>
  <!-- i18n — sistema de tradução (deve carregar antes do app.js) -->
  <script src="i18n.js"></script>
  <!-- Firebase SDKs -->
  <script type="module" src="firebase.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
